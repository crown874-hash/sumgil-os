<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>숨길 Academy</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#0d4f46,#f3efe5);display:flex;justify-content:center}
.wrap{max-width:430px;min-height:100vh;background:#f7f4ed}
.hero{background:#0d4f46;color:#fff;padding:48px 28px;border-bottom-left-radius:36px;border-bottom-right-radius:36px}
.badge{display:inline-block;padding:6px 12px;background:#ffffff22;border-radius:99px;font-size:12px}
h1{font-size:40px;margin:18px 0 10px}
p{line-height:1.7;opacity:.92}
.card{margin:-30px 18px 20px;background:#fff;border-radius:24px;padding:24px;box-shadow:0 12px 35px rgba(0,0,0,.12)}
.btn{display:block;text-align:center;text-decoration:none;background:#0d4f46;color:#fff;padding:18px;border-radius:16px;font-weight:bold;font-size:18px;margin-top:18px}
.info{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.box{background:#f4f2ec;border-radius:16px;padding:16px;text-align:center}
small{color:#666}
.footer{text-align:center;padding:18px;color:#666}
</style></head>
<body><div class="wrap">
<div class="hero">
<span class="badge">PILOT PROJECT</span>
<h1>숨길<br>Academy</h1>
<p>사람을 건강하게,<br>사회를 건강하게.</p>
</div>
<div class="card">
<h2>7명 파일럿 모집</h2>
<p>BBB(Balance of Brain & Body)를 바탕으로 생활 루틴을 기록하고 스스로를 관찰하는 파일럿 프로젝트입니다.</p>
<div class="info">
<div class="box"><strong>7명</strong><br><small>모집</small></div>
<div class="box"><strong>4주</strong><br><small>루틴</small></div>
</div>
<a class="btn" href="#">파일럿 참가 신청</a>
</div>
<div class="footer">BBB with JOY</div>
</div></body></html>
